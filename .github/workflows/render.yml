name: Render working paper

on:
  push:
    branches: [main]
    paths:
      - "paper.qmd"
      - "references.bib"
      - "_quarto.yml"
      - "styles.scss"
      - "analysis/**"
      - "data/**"
      - ".github/workflows/render.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.5.57

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Cache R packages
        uses: r-lib/actions/setup-renv@v2
        if: hashFiles('renv.lock') != ''

      - name: Install Lato font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lato fonts-lmodern texlive-xetex texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra
          fc-cache -fv

      - name: Render to PDF and HTML
        run: |
          quarto render paper.qmd

      - name: Upload rendered artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-rendered
          path: |
            _output/paper.pdf
            _output/paper.html
            _output/paper_files/

      - name: Attach PDF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: _output/paper.pdf
